<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Security Research Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.9.0/dist/Recharts.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: lightpink;
            --bg-secondary: #fce4ec;
            --bg-tertiary: #f8bbd9;
            --accent-primary: #00ff88;
            --accent-secondary: #000000;
            --accent-warning: #ffaa00;
            --text-primary: #000000;
            --text-secondary: #333333;
            --border-color: #cccccc;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: Arial, sans-serif;
            background: url('images/security.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .header h1 {
            font-family: 'Courier New', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 15px;
            position: relative;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1.2rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .research-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid #000000;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            margin-top: 20px;
            color: #000000;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin: 40px 0;
            padding: 0 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-tab {
            font-family: 'Courier New', monospace;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .nav-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-tab:hover::before {
            left: 100%;
        }

        .nav-tab:hover {
            border-color: #000000;
            color: #000000;
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.1));
            border-color: #000000;
            color: #000000;
            box-shadow: var(--shadow);
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #000000;
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .card-header {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            font-family: 'Courier New', monospace;
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: Arial, sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn {
            font-family: 'Courier New', monospace;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-weight: 700;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: #000000;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: #000000;
            color: #000000;
        }

        .btn-danger {
            background: #000000;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Grid Layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Stats Cards */
        .stat-card {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-primary);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateX(5px);
            border-left-width: 6px;
        }

        .stat-value {
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Vulnerability List */
        .vuln-list {
            list-style: none;
        }

        .vuln-item {
            background: var(--bg-tertiary);
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .vuln-item:hover {
            transform: translateX(5px);
            background: rgba(255, 51, 102, 0.1);
        }

        .vuln-severity {
            font-family: 'Courier New', monospace;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .severity-critical {
            background: rgba(255, 51, 102, 0.2);
            color: var(--accent-secondary);
        }

        .severity-high {
            background: rgba(255, 170, 0, 0.2);
            color: var(--accent-warning);
        }

        .severity-medium {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .severity-low {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-primary);
        }

        /* Code Display */
        .code-display {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            position: relative;
        }

        .code-display pre {
            margin: 0;
            color: var(--text-primary);
        }

        .code-line {
            display: block;
            padding: 2px 0;
        }

        .code-line-number {
            display: inline-block;
            width: 40px;
            color: var(--text-secondary);
            user-select: none;
        }

        /* Model Selector */
        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .model-card {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .model-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-3px);
        }

        .model-card.selected {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 204, 255, 0.1));
            box-shadow: var(--shadow);
        }

        .model-name {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .model-provider {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), #ffaa00);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        /* Alerts */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .alert-info {
            background: rgba(255, 170, 0, 0.1);
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .alert-warning {
            background: rgba(255, 170, 0, 0.1);
            border-color: var(--accent-warning);
            color: var(--accent-warning);
        }

        .alert-danger {
            background: rgba(255, 51, 102, 0.1);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
        }

        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 40px;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .data-table tr:hover {
            background: var(--bg-tertiary);
        }

        /* Charts Container */
        .chart-container {
            background: var(--bg-tertiary);
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .chart-title {
            font-family: 'Courier New', monospace;
            color: var(--accent-primary);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-success {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-primary);
        }

        .badge-danger {
            background: rgba(255, 51, 102, 0.2);
            color: var(--accent-secondary);
        }

        .badge-warning {
            background: rgba(255, 170, 0, 0.2);
            color: var(--accent-warning);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .nav-tabs {
                flex-direction: column;
            }
            
            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }
            
            .card {
                padding: 20px;
            }
        }

        /* Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: slideInUp 0.6s ease-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* Export Button */
        .export-options {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Method Card */
        .method-section {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 204, 255, 0.05));
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .method-section p {
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }

        .method-section ul li {
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }

        .method-step {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-start;
        }

        .step-number {
            font-family: 'Courier New', monospace;
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-content h3 {
            font-family: 'Courier New', monospace;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }
    </style>
</head>

    <script type="text/babel">

                    vulnerabilities.push({
                        id: `${vulnType.id}_${Date.now()}_${index}`,

    );
}`,
                database: `// Generated Database Handler

function saveToDatabase(data) {
    // SECURITY ISSUE: SQL Injection vulnerability
    const query = \`INSERT INTO users VALUES ('\${data.name}', '\${data.email}')\`;

                default: `// Generated Code for: ${prompt}
// Model: ${model}

    // SECURITY ISSUE: No input validation
    eval(input); // SECURITY ISSUE: Dangerous eval usage
    
    // SECURITY ISSUE: XSS vulnerability
    document.getElementById('output').innerHTML = input;

// SECURITY ISSUE: Exposed credentials
const config = {
    apiKey: "1234567890",
    secret: "my-secret-key"
};`
            };

            if (prompt.toLowerCase().includes('login')) return templates.login;
            if (prompt.toLowerCase().includes('database') || prompt.toLowerCase().includes('save')) return templates.database;
            return templates.default;
        };

        // Main App Component
        function App() {
            const [activeTab, setActiveTab] = useState('generate');
            const [selectedModels, setSelectedModels] = useState([]);
            const [prompt, setPrompt] = useState('');
            const [generatedApps, setGeneratedApps] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [scanResults, setScanResults] = useState([]);
            const [progress, setProgress] = useState(0);

            // Toggle model selection
            const toggleModel = (modelId) => {
                setSelectedModels(prev => 
                    prev.includes(modelId) 
                        ? prev.filter(id => id !== modelId)
                        : [...prev, modelId]
                );
            };

            // Generate apps with selected models
            const generateApps = async () => {
                if (!prompt || selectedModels.length === 0) {
                    alert('Please enter a prompt and select at least one model');
                    return;
                }

                setIsGenerating(true);
                setProgress(0);
                const apps = [];
                const results = [];

                for (let i = 0; i < selectedModels.length; i++) {
                    const model = selectedModels[i];
                    setProgress(((i + 1) / selectedModels.length) * 100);

                    // Simulate generation delay
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    const code = generateMockCode(prompt, model);
                    const vulnerabilities = detectVulnerabilities(code, model);

                    const app = {
                        id: `app_${Date.now()}_${i}`,
                        model,
                        prompt,
                        code,
                        timestamp: new Date(),
                        vulnerabilities,
                    };

                    apps.push(app);
                    results.push({
                        model,
                        totalVulns: vulnerabilities.length,
                        critical: vulnerabilities.filter(v => v.severity === 'critical').length,
                        high: vulnerabilities.filter(v => v.severity === 'high').length,
                        medium: vulnerabilities.filter(v => v.severity === 'medium').length,
                    });
                }

                setGeneratedApps(prev => [...apps, ...prev]);
                setScanResults(prev => [...results, ...prev]);
                setIsGenerating(false);
                setProgress(0);
                setActiveTab('results');
            };

            // Export data
            const exportData = (format) => {
                const data = {
                    timestamp: new Date().toISOString(),
                    totalApps: generatedApps.length,
                    scanResults,
                    apps: generatedApps.map(app => ({
                        model: app.model,
                        prompt: app.prompt,
                        vulnerabilityCount: app.vulnerabilities.length,
                        vulnerabilities: app.vulnerabilities,
                    })),
                };

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `vibe-coding-research-${Date.now()}.json`;
                a.click();
            };

            return (
                <div className="app-container">
                    <Header />
                    <Navigation activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    {activeTab === 'overview' && <OverviewTab />}
                    {activeTab === 'generate' && (
                        <GenerateTab
                            prompt={prompt}
                            setPrompt={setPrompt}
                            selectedModels={selectedModels}
                            toggleModel={toggleModel}
                            generateApps={generateApps}
                            isGenerating={isGenerating}
                            progress={progress}
                        />
                    )}
                    {activeTab === 'results' && (
                        <ResultsTab
                            generatedApps={generatedApps}
                            scanResults={scanResults}
                            exportData={exportData}
                        />
                    )}
                    {activeTab === 'analytics' && (
                        <AnalyticsTab
                            generatedApps={generatedApps}
                            scanResults={scanResults}
                        />
                    )}
                    {activeTab === 'methodology' && <MethodologyTab />}
                </div>
            );
        }

        // Header Component
        function Header() {
            return (
                <header className="header">
                    <h1>Vibe Coding Security Research</h1>
                    <p>
                        Analyzing security vulnerabilities in AI-generated applications through 
                        systematic prompt-based code generation and automated security scanning
                    </p>
                    <span className="research-badge">
                        Research Platform v1.0 | Live Security Analysis
                    </span>
                </header>
            );
        }

        // Navigation Component
        function Navigation({ activeTab, setActiveTab }) {
            const tabs = [
                { id: 'overview', label: '📊 Overview', icon: '📊' },
                { id: 'generate', label: '🚀 Generate Apps', icon: '🚀' },
                { id: 'results', label: '🔍 Scan Results', icon: '🔍' },
                { id: 'analytics', label: '📈 Analytics', icon: '📈' },
                { id: 'methodology', label: '📚 Methodology', icon: '📚' },
            ];

            return (
                <nav className="nav-tabs">
                    {tabs.map(tab => (
                        <button
                            key={tab.id}
                            className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`}
                            onClick={() => setActiveTab(tab.id)}
                        >
                            {tab.label}
                        </button>
                    ))}
                </nav>
            );
        }

        // Overview Tab
        function OverviewTab() {
            return (
                <div className="animate-in">
                    <div className="card">
                        <h2 className="card-header">
                            <span className="card-icon">🎯</span>
                            Research Question
                        </h2>
                        <p style={{ fontSize: '1.1rem', lineHeight: '1.8' }}>
                            <strong>Does "Vibe Coding" lead to insecure defaults?</strong><br />
                            A comprehensive study of prompt-injected vulnerabilities in AI-generated full-stack applications 
                            across multiple Large Language Models (LLMs).
                        </p>
                    </div>

                    <div className="grid-3">
                        <div className="stat-card">
                            <div className="stat-value">5</div>
                            <div className="stat-label">LLM Models</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">100+</div>
                            <div className="stat-label">Test Apps</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value">10</div>
                            <div className="stat-label">Vulnerability Types</div>
                        </div>
                    </div>

                    <div className="card">
                        <h2 className="card-header">
                            <span className="card-icon">⚡</span>
                            Key Features
                        </h2>
                        <div className="grid-2">
                            <div>
                                <h3 style={{ color: 'var(--accent-primary)', marginBottom: '10px' }}>
                                    🤖 Multi-Model Testing
                                </h3>
                                <p>Test code generation across GPT-4, Claude, Gemini, Llama, and Mistral</p>
                            </div>
                            <div>
                                <h3 style={{ color: 'var(--accent-primary)', marginBottom: '10px' }}>
                                    🔒 Security Scanning
                                </h3>
                                <p>Automated vulnerability detection for SQL injection, XSS, hardcoded secrets, and more</p>
                            </div>
                            <div>
                                <h3 style={{ color: 'var(--accent-primary)', marginBottom: '10px' }}>
                                    📊 Real-time Analytics
                                </h3>
                                <p>Live charts and statistics comparing security patterns across models</p>
                            </div>
                            <div>
                                <h3 style={{ color: 'var(--accent-primary)', marginBottom: '10px' }}>
                                    💾 Data Export
                                </h3>
                                <p>Export results in JSON format for further analysis and research papers</p>
                            </div>
                        </div>
                    </div>

                    <div className="alert alert-info">
                        <strong>Getting Started:</strong> Navigate to the "Generate Apps" tab to begin creating 
                        test applications. Select your target LLMs, enter a prompt, and let the platform generate 
                        and scan the code automatically.
                    </div>
                </div>
            );
        }

        // Generate Tab
        function GenerateTab({ prompt, setPrompt, selectedModels, toggleModel, generateApps, isGenerating, progress }) {
            return (
                <div className="animate-in">
                    <div className="card">
                        <h2 className="card-header">
                            <span className="card-icon">🎨</span>
                            Select LLM Models
                        </h2>
                        <p style={{ marginBottom: '20px', color: 'var(--text-secondary)' }}>
                            Choose which models to test. Each model will generate code based on your prompt.
                        </p>
                        <div className="model-grid">
                            {LLM_MODELS.map(model => (
                                <div
                                    key={model.id}
                                    className={`model-card ${selectedModels.includes(model.id) ? 'selected' : ''}`}
                                    onClick={() => toggleModel(model.id)}
                                >
                                    <div style={{ fontSize: '2rem', marginBottom: '10px' }}>{model.icon}</div>
                                    <div className="model-name">{model.name}</div>
                                    <div className="model-provider">{model.provider}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="card">
                        <h2 className="card-header">
                            <span className="card-icon">✍️</span>
                            Enter Prompt
                        </h2>
                        <div className="form-group">
                            <label className="form-label">What would you like to build?</label>
                            <textarea
                                className="form-textarea"
                                value={prompt}
                                onChange={(e) => setPrompt(e.target.value)}
                                placeholder="e.g., Build me a login page with username and password"
                                rows={4}
                            />
                        </div>

                        <div style={{ marginTop: '20px' }}>
                            <label className="form-label">Sample Prompts:</label>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px', marginTop: '10px' }}>
                                {SAMPLE_PROMPTS.slice(0, 5).map((sample, idx) => (
                                    <button
                                        key={idx}
                                        className="btn btn-secondary"
                                        onClick={() => setPrompt(sample)}
                                        style={{ fontSize: '0.85rem', padding: '8px 16px' }}
                                    >
                                        {sample}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isGenerating && (
                        <div className="card">
                            <div className="loading-container">
                                <div className="loading-spinner"></div>
                                <p>Generating applications and scanning for vulnerabilities...</p>
                                <div className="progress-bar">
                                    <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                                </div>
                                <p style={{ color: 'var(--text-secondary)' }}>{Math.round(progress)}% complete</p>
                            </div>
                        </div>
                    )}

                    <button
                        className="btn btn-primary"
                        onClick={generateApps}
                        disabled={isGenerating || selectedModels.length === 0 || !prompt}
                        style={{ width: '100%', padding: '16px', fontSize: '1.1rem' }}
                    >
                        {isGenerating ? 'Generating...' : `Generate & Scan with ${selectedModels.length} Model${selectedModels.length !== 1 ? 's' : ''}`}
                    </button>

                    {selectedModels.length === 0 && (
                        <div className="alert alert-warning" style={{ marginTop: '20px' }}>
                            Please select at least one LLM model to continue
                        </div>
                    )}
                </div>
            );
        }

        // Results Tab
        function ResultsTab({ generatedApps, scanResults, exportData }) {
            const [selectedApp, setSelectedApp] = useState(null);
            const detailsRef = useRef(null);

            // Scroll to details when app is selected
            useEffect(() => {
                if (selectedApp && detailsRef.current) {
                    detailsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, [selectedApp]);

            if (generatedApps.length === 0) {
                return (
                    <div className="animate-in">
                        <div className="alert alert-info">
                            No applications generated yet. Go to the "Generate Apps" tab to create test applications.
                        </div>
                    </div>
                );
            }

            return (
                <div className="animate-in">
                    <div className="card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <h2 className="card-header" style={{ marginBottom: 0 }}>
                                <span className="card-icon">🔍</span>
                                Scan Results
                            </h2>
                            <div className="export-options">
                                <button className="btn btn-secondary" onClick={() => exportData('json')}>
                                    📥 Export JSON
                                </button>
                                <button className="btn btn-secondary" onClick={() => exportData('csv')}>
                                    📊 Export CSV
                                </button>
                            </div>
                        </div>

                        <div className="grid-3" style={{ marginBottom: '30px' }}>
                            <div className="stat-card">
                                <div className="stat-value">{generatedApps.length}</div>
                                <div className="stat-label">Total Apps Generated</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-value" style={{ color: 'var(--accent-secondary)' }}>
                                    {generatedApps.reduce((sum, app) => sum + app.vulnerabilities.length, 0)}
                                </div>
                                <div className="stat-label">Total Vulnerabilities</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-value" style={{ color: 'var(--accent-warning)' }}>
                                    {(generatedApps.reduce((sum, app) => sum + app.vulnerabilities.length, 0) / generatedApps.length).toFixed(1)}
                                </div>
                                <div className="stat-label">Avg per App</div>
                            </div>
                        </div>

                        <table className="data-table">
                            <thead>
                                <tr>
                                    <th>App ID</th>
                                    <th>Model</th>
                                    <th>Prompt</th>
                                    <th>Vulnerabilities</th>
                                    <th>Critical</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {generatedApps.map(app => {
                                    const modelInfo = LLM_MODELS.find(m => m.id === app.model);
                                    const critical = app.vulnerabilities.filter(v => v.severity === 'critical').length;
                                    const isSelected = selectedApp?.id === app.id;
                                    
                                    return (
                                        <tr 
                                            key={app.id}
                                            style={{ 
                                                backgroundColor: isSelected ? 'rgba(0, 255, 136, 0.1)' : 'transparent',
                                                borderLeft: isSelected ? '3px solid var(--accent-primary)' : '3px solid transparent'
                                            }}
                                        >
                                            <td style={{ fontFamily: 'JetBrains Mono' }}>{app.id.slice(0, 12)}...</td>
                                            <td>{modelInfo?.icon} {modelInfo?.name}</td>
                                            <td style={{ maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                {app.prompt}
                                            </td>
                                            <td>
                                                <span className="badge badge-danger">{app.vulnerabilities.length}</span>
                                            </td>
                                            <td>
                                                {critical > 0 && <span className="badge badge-danger">{critical}</span>}
                                            </td>
                                            <td>
                                                <button
                                                    className="btn btn-secondary"
                                                    onClick={() => setSelectedApp(app)}
                                                    style={{ 
                                                        padding: '6px 12px', 
                                                        fontSize: '0.85rem',
                                                        backgroundColor: isSelected ? 'var(--accent-primary)' : '',
                                                        color: isSelected ? 'var(--bg-primary)' : ''
                                                    }}
                                                >
                                                    {isSelected ? '✓ Viewing' : 'View Details'}
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {!selectedApp && generatedApps.length > 0 && (
                        <div className="alert alert-info" style={{ marginTop: '20px' }}>
                            💡 Click "View Details" on any app above to see full vulnerability analysis and generated code
                        </div>
                    )}

                    {selectedApp && (
                        <div className="card" ref={detailsRef} style={{ 
                            marginTop: '30px',
                            animation: 'slideInUp 0.4s ease-out',
                            border: '2px solid var(--accent-primary)',
                            boxShadow: '0 0 30px rgba(0, 255, 136, 0.2)'
                        }}>
                            <div className="alert alert-success" style={{ marginBottom: '20px' }}>
                                ✓ Viewing details for selected application. Scroll down to see vulnerabilities and code.
                            </div>
                            
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                                <h2 className="card-header" style={{ marginBottom: 0 }}>
                                    <span className="card-icon">📝</span>
                                    App Details: {selectedApp.id}
                                </h2>
                                <button
                                    className="btn btn-danger"
                                    onClick={() => setSelectedApp(null)}
                                >
                                    ✕ Close Details
                                </button>
                            </div>

                            <div style={{ marginBottom: '20px' }}>
                                <p><strong>Model:</strong> {LLM_MODELS.find(m => m.id === selectedApp.model)?.name}</p>
                                <p><strong>Prompt:</strong> {selectedApp.prompt}</p>
                                <p><strong>Generated:</strong> {selectedApp.timestamp.toLocaleString()}</p>
                            </div>

                            <h3 style={{ color: 'var(--accent-primary)', marginBottom: '15px' }}>
                                Vulnerabilities Found ({selectedApp.vulnerabilities.length})
                            </h3>
                            <ul className="vuln-list">
                                {selectedApp.vulnerabilities.map(vuln => (
                                    <li key={vuln.id} className="vuln-item">
                                        <div>
                                            <strong>{vuln.type}</strong>
                                            <p style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', marginTop: '5px' }}>
                                                Line {vuln.line}: {vuln.description}
                                            </p>
                                        </div>
                                        <span className={`vuln-severity severity-${vuln.severity}`}>
                                            {vuln.severity}
                                        </span>
                                    </li>
                                ))}
                            </ul>

                            <h3 style={{ color: 'var(--accent-primary)', marginTop: '30px', marginBottom: '15px' }}>
                                Generated Code
                            </h3>
                            <div className="code-display">
                                <pre>{selectedApp.code}</pre>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Analytics Tab
        function AnalyticsTab({ generatedApps, scanResults }) {
            if (generatedApps.length === 0) {
                return (
                    <div className="animate-in">
                        <div className="alert alert-info">
                            No data available yet. Generate some applications to see analytics.
                        </div>
                    </div>
                );
            }

            // Calculate statistics by model
            const modelStats = LLM_MODELS.map(model => {
                const modelApps = generatedApps.filter(app => app.model === model.id);
                const totalVulns = modelApps.reduce((sum, app) => sum + app.vulnerabilities.length, 0);
                
                return {
                    name: model.name,
                    apps: modelApps.length,
                    vulnerabilities: totalVulns,
                    avgVulns: modelApps.length > 0 ? (totalVulns / modelApps.length).toFixed(2) : 0,
                    critical: modelApps.reduce((sum, app) => 
                        sum + app.vulnerabilities.filter(v => v.severity === 'critical').length, 0
                    ),
                };
            }).filter(stat => stat.apps > 0);

            // Vulnerability distribution
            const vulnDistribution = VULNERABILITY_TYPES.map(vulnType => {
                const count = generatedApps.reduce((sum, app) => 
                    sum + app.vulnerabilities.filter(v => v.type === vulnType.name).length, 0
                );
                return {
                    name: vulnType.name.split(' ').slice(0, 2).join(' '),
                    count,
                };
            }).filter(v => v.count > 0);

            const COLORS = ['#00ff88', '#ffaa00', '#ffaa00', '#ff3366', '#9b59b6'];

            return (
                <div className="animate-in">
                    <div className="card">
                        <h2 className="card-header">
                            <span className="card-icon">📊</span>
                            Model Comparison
                        </h2>
                        <div className="chart-container">
                            <ResponsiveContainer width="100%" height={300}>
                                <BarChart data={modelStats}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="var(--border-color)" />
                                    <XAxis dataKey="name" stroke="var(--text-secondary)" />
                                    <YAxis stroke="var(--text-secondary)" />
                                    <Tooltip 
                                        contentStyle={{ 
                                            background: 'var(--bg-tertiary)', 
                                            border: '1px solid var(--border-color)',
                                            borderRadius: '8px',
                                            color: 'var(--text-primary)'
                                        }}
                                    />
                                    <Legend />
                                    <Bar dataKey="vulnerabilities" fill="var(--accent-secondary)" name="Total Vulnerabilities" />
                                    <Bar dataKey="critical" fill="var(--accent-warning)" name="Critical Vulnerabilities" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <h2 className="card-header">
                                <span className="card-icon">🎯</span>
                                Vulnerability Types
                            </h2>
                            <div className="chart-container">
                                <ResponsiveContainer width="100%" height={300}>
                                    <PieChart>
                                        <Pie
                                            data={vulnDistribution}
                                            cx="50%"
                                            cy="50%"
                                            labelLine={false}
                                            label={({ name, percent }) => `${name}: ${(percent * 100).toFixed(0)}%`}
                                            outerRadius={80}
                                            fill="#8884d8"
                                            dataKey="count"
                                        >
                                            {vulnDistribution.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                            ))}
                                        </Pie>
                                        <Tooltip 
                                            contentStyle={{ 
                                                background: 'var(--bg-tertiary)', 
                                                border: '1px solid var(--border-color)',
                                                borderRadius: '8px',
                                                color: 'var(--text-primary)'
                                            }}
                                        />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="card">
                            <h2 className="card-header">
                                <span className="card-icon">📈</span>
                                Model Security Scores
                            </h2>
                            <div style={{ padding: '20px 0' }}>
                                {modelStats.map((stat, idx) => {
                                    const securityScore = Math.max(0, 100 - (stat.avgVulns * 10));
                                    return (
                                        <div key={idx} style={{ marginBottom: '25px' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                                                <span style={{ fontFamily: 'Space Mono' }}>{stat.name}</span>
                                                <span style={{ color: 'var(--accent-primary)', fontWeight: 'bold' }}>
                                                    {securityScore.toFixed(0)}/100
                                                </span>
                                            </div>
                                            <div className="progress-bar">
                                                <div 
                                                    className="progress-fill" 
                                                    style={{ width: `${securityScore}%` }}
                                                ></div>
                                            </div>
                                            <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginTop: '5px' }}>
                                                Avg {stat.avgVulns} vulnerabilities per app
                                            </p>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h2 className="card-header">
                            <span className="card-icon">💡</span>
                            Key Findings
                        </h2>
                        <div className="grid-2">
                            <div className="alert alert-warning">
                                <strong>Most Common Vulnerability:</strong><br />
                                {vulnDistribution[0]?.name} ({vulnDistribution[0]?.count} instances)
                            </div>
                            <div className="alert alert-danger">
                                <strong>Highest Risk Model:</strong><br />
                                {modelStats.sort((a, b) => b.avgVulns - a.avgVulns)[0]?.name} 
                                ({modelStats.sort((a, b) => b.avgVulns - a.avgVulns)[0]?.avgVulns} avg vulnerabilities)
                            </div>
                            <div className="alert alert-success">
                                <strong>Best Performing Model:</strong><br />
                                {modelStats.sort((a, b) => a.avgVulns - b.avgVulns)[0]?.name}
                                ({modelStats.sort((a, b) => a.avgVulns - b.avgVulns)[0]?.avgVulns} avg vulnerabilities)
                            </div>
                            <div className="alert alert-info">
                                <strong>Total Security Issues:</strong><br />
                                {generatedApps.reduce((sum, app) => sum + app.vulnerabilities.length, 0)} vulnerabilities 
                                across {generatedApps.length} applications
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Methodology Tab
        function MethodologyTab() {
            return (
                <div className="animate-in">
                    <div className="method-section">
                        <h2 style={{ fontFamily: 'Space Mono', color: 'var(--accent-primary)', marginBottom: '30px' }}>
                            Research Methodology
                        </h2>

                        <div className="method-step">
                            <div className="step-number">1</div>
                            <div className="step-content">
                                <h3>Model Selection</h3>
                                <p>
                                    Five leading LLMs are tested: GPT-4 (OpenAI), Claude 3.5 (Anthropic), 
                                    Gemini Pro (Google), Llama 3 (Meta), and Mistral Large (Mistral AI). 
                                    These represent the current state-of-the-art in code generation.

                            <div className="step-number">2</div>
                            <div className="step-content">
                                <h3>Prompt Design</h3>
                                <p>
                                    100 simple, realistic prompts are used, such as "build me a login page" or 
                                    "create a contact form that saves to database". These represent typical 
                                    requests from developers new to coding or using "vibe coding" approaches.
                                </p>
                            </div>

                            <div className="step-content">
                                <h3>Code Generation</h3>

                                    The generated code includes frontend components, backend APIs, and database 
                                    interactions as appropriate.

                                <h3>Security Scanning</h3>

                                    Generated code is analyzed using industry-standard security tools 
                                    (Snyk, SonarQube) to detect vulnerabilities including:
                                </p>
                                <ul style={{ marginTop: '10px', paddingLeft: '20px' }}>
                                    <li>SQL Injection vulnerabilities</li>
                                    <li>Cross-Site Scripting (XSS)</li>
                                    <li>Hardcoded secrets and API keys</li>
                                    <li>Insecure authentication patterns</li>
                                    <li>CSRF vulnerabilities</li>
                                    <li>Weak cryptography</li>
                                    <li>Path traversal issues</li>
                                    <li>Missing input validation</li>
                                    <li>Insecure dependencies</li>
                                    <li>Sensitive data exposure</li>
                                </ul>
                            </div>
                        </div>

                        <div className="method-step">
                            <div className="step-number">5</div>
                            <div className="step-content">
                                <h3>Data Analysis</h3>
                                <p>
                                    Results are aggregated and analyzed to identify patterns across models, 
                                    vulnerability types, and prompt categories. Statistical analysis determines 
                                    which models consistently produce more secure code and which vulnerability 
                                    types are most common.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="card">

                            <div>
                                <h4 style={{ color: 'var(--accent-primary)', marginBottom: '10px' }}>Primary Question</h4>

                                    Does "vibe coding" (prompt-based development) lead to systematically

                                <h4 style={{ color: 'var(--accent-primary)', marginBottom: '10px' }}>Secondary Questions</h4>

                                    <li>What vulnerability types are most common?</li>

                                    <li>How does code quality vary across models?</li>
